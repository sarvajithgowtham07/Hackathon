<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VirtuTeach AI | Complete Teaching Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.75));
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .login-card {
      background: white;
      border-radius: 48px;
      padding: 40px 48px;
      width: 460px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .login-card h1 {
      font-size: 2.4rem;
      background: linear-gradient(135deg, #1F2B3D, #2C5364);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .input-group {
      text-align: left;
      margin-bottom: 20px;
      margin-top: 20px;
    }

    .input-group label {
      font-weight: 600;
      color: #1e2a36;
      display: block;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 28px;
      border: 1px solid #cad2db;
      font-size: 1rem;
    }

    .login-btn {
      background: linear-gradient(135deg, #1f4e6e, #2C7DA0);
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
      font-size: 1rem;
    }

    .guest-btn {
      background: transparent;
      color: #1f4e6e;
      border: 2px solid #1f4e6e;
      margin-top: 12px;
    }

    .app-container {
      display: none;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .classroom-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.pexels.com/photos/207691/pexels-photo-207691.jpeg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    
    .classroom-background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }

    .dashboard {
      display: flex;
      height: 100%;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      width: 280px;
      background: linear-gradient(180deg, rgba(20, 30, 40, 0.95), rgba(15, 26, 34, 0.95));
      backdrop-filter: blur(10px);
      color: white;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .teacher-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.15);
      padding: 12px;
      border-radius: 60px;
    }

    .teacher-badge i {
      font-size: 2rem;
    }

    .upload-area {
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 16px;
      text-align: center;
    }

    .upload-label {
      background: linear-gradient(135deg, #2C7DA0, #1a5a7a);
      display: inline-block;
      padding: 8px 18px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      margin: 12px 0;
    }

    .file-list {
      list-style: none;
      margin-top: 12px;
      font-size: 0.8rem;
    }

    .file-list li {
      background: rgba(255,255,255,0.15);
      margin: 8px 0;
      padding: 8px 10px;
      border-radius: 20px;
      word-break: break-word;
    }

    .alignment-meter {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 12px;
    }

    .meter-bar {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      height: 8px;
      margin: 8px 0;
      overflow: hidden;
    }

    .meter-fill {
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      width: 0%;
      height: 100%;
      transition: width 0.5s ease;
    }

    .classroom-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(244, 249, 254, 0.85);
      backdrop-filter: blur(2px);
      overflow-y: auto;
    }

    .board-section {
      background: rgba(255, 255, 255, 0.95);
      margin: 20px 24px 10px 24px;
      border-radius: 36px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .board-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e2e8f0;
    }

    .board-content {
      min-height: 180px;
      background: linear-gradient(135deg, #fef9e6, #fffef5);
      border-radius: 24px;
      padding: 20px;
      line-height: 1.5;
      color: #2d3e50;
      max-height: 300px;
      overflow-y: auto;
    }

    .students-arena {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 20px 24px;
      background: rgba(238, 243, 252, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 64px;
      padding: 32px 20px;
    }

    .student-card {
      background: white;
      width: 150px;
      padding: 20px 10px 18px;
      border-radius: 80px 80px 60px 60px;
      text-align: center;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
      position: relative;
      transition: transform 0.3s ease;
      cursor: pointer;
    }

    .student-card:hover {
      transform: translateY(-5px);
    }

    .student-avatar {
      font-size: 64px;
    }

    .student-name {
      font-weight: 800;
      margin-top: 12px;
    }

    .status-badge {
      font-size: 0.7rem;
      background: #eef2f5;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 50px;
      margin-top: 8px;
    }

    .bubble {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2f3c;
      color: white;
      padding: 8px 14px;
      border-radius: 36px;
      font-size: 0.8rem;
      white-space: nowrap;
      animation: popUp 0.4s ease-out forwards;
      z-index: 20;
    }

    @keyframes popUp {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px);}
      100% { opacity: 1; transform: translateX(-50%) translateY(0);}
    }

    .control-bar {
      background: rgba(255, 255, 255, 0.95);
      margin: 0 24px 24px 24px;
      padding: 14px 24px;
      border-radius: 80px;
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
    }

    .lecture-toggle-btn {
      background: #2b6e49;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 160px;
      justify-content: center;
    }

    .lecture-toggle-btn.lecture-active {
      background: #c44536;
    }

    .mic-btn {
      background: #2c7da0;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .mic-btn.mic-active {
      background: #e74c3c;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .text-input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      background: white;
    }

    .data-counter {
      background: #eef2f5;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .summary-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f0f7ff, #e2eafc);
      z-index: 1500;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .summary-card {
      max-width: 700px;
      background: white;
      border-radius: 56px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 35px 55px rgba(0,0,0,0.2);
      animation: slideUp 0.4s ease;
    }

    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto;
      font-size: 3rem;
      font-weight: 800;
    }

    .restart-btn {
      background: linear-gradient(135deg, #1f4e6e, #2C7DA0);
      color: white;
      padding: 12px 32px;
      border-radius: 50px;
      border: none;
      margin-top: 24px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    @media (max-width: 780px) {
      .sidebar { width: 240px; }
      .student-card { width: 110px; }
      .student-avatar { font-size: 50px; }
      .control-bar { flex-direction: column; }
      .lecture-toggle-btn, .mic-btn { width: 100%; justify-content: center; }
      .text-input { width: 100%; }
    }
  </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <i class="fas fa-chalkboard-teacher" style="font-size: 52px; color: #2C7DA0;"></i>
    <h1>VirtuTeach AI</h1>
    <p style="color: #666; margin-bottom: 20px;">Complete Teaching Platform</p>
    <div class="input-group">
      <label><i class="fas fa-user"></i> Your Name</label>
      <input type="text" id="teacherName" placeholder="Enter your name">
    </div>
    <button class="login-btn" onclick="handleLogin()">Enter Classroom</button>
    <button class="login-btn guest-btn" onclick="guestLogin()">Continue as Guest</button>
  </div>
</div>

<div id="appContainer" class="app-container">
  <div class="classroom-background"></div>
  
  <div class="dashboard">
    <div class="sidebar">
      <div class="teacher-badge">
        <i class="fas fa-chalkboard-user"></i>
        <span id="sidebarTeacherName">Teacher</span>
      </div>
      <div class="upload-area">
        <i class="fas fa-cloud-upload-alt"></i>
        <div><strong>Teaching Material</strong></div>
        <label class="upload-label" for="pdfUpload">
          <i class="fas fa-upload"></i> Upload PDF or TXT
        </label>
        <input type="file" id="pdfUpload" accept=".pdf,.txt" style="display: none;" />
        <ul class="file-list" id="fileList">
          <li><i class="fas fa-info-circle"></i> No material uploaded</li>
        </ul>
        <div class="alignment-meter" id="alignmentMeter" style="display:none;">
          <div><i class="fas fa-chart-line"></i> Material Alignment</div>
          <div class="meter-bar">
            <div class="meter-fill" id="alignmentFill"></div>
          </div>
          <div id="alignmentText" style="font-size: 11px; margin-top: 5px;">Not verified</div>
        </div>
      </div>
    </div>

    <div class="classroom-main">
      <div class="board-section">
        <div class="board-header">
          <span><i class="fas fa-chalkboard"></i> <strong>Interactive Board</strong></span>
          <span id="boardFileName" style="font-size:12px; background:#eef2f5; padding:4px 12px; border-radius:20px;">📄 No material</span>
        </div>
        <div class="board-content" id="boardContent">
          📚 Upload teaching material and click "Start Lecture" to begin!
        </div>
      </div>

      <div class="students-arena" id="studentsArena">
        <div class="student-card" data-student="Rahul">
          <div class="student-avatar">🧑‍🎓</div>
          <div class="student-name">Rahul</div>
          <div class="status-badge" id="statusRahul">🤔 Ready</div>
          <div id="bubbleRahul"></div>
        </div>
        <div class="student-card" data-student="Ananya">
          <div class="student-avatar">👩‍🎓</div>
          <div class="student-name">Ananya</div>
          <div class="status-badge" id="statusAnanya">🤔 Ready</div>
          <div id="bubbleAnanya"></div>
        </div>
        <div class="student-card" data-student="Arjun">
          <div class="student-avatar">🧑‍💻</div>
          <div class="student-name">Arjun</div>
          <div class="status-badge" id="statusArjun">😐 Ready</div>
          <div id="bubbleArjun"></div>
        </div>
      </div>

      <div class="control-bar">
        <button id="lectureToggleBtn" class="lecture-toggle-btn">
          <i class="fas fa-play"></i> Start Lecture
        </button>
        <button id="micButton" class="mic-btn">
          <i class="fas fa-microphone"></i> Start Mic
        </button>
        <input type="text" id="manualText" class="text-input" placeholder="Type your explanation & press Enter..." />
        <div class="data-counter" id="dataCounter">📊 0 explanations</div>
      </div>
    </div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
  
  let sessionActive = false;
  let sessionScores = [];
  let lastApiCall = 0;
  let recognition = null;
  let isMicActive = false;
  let uploadedKeywords = [];
  let teacherName = "";
  
  const API_URL = "http://localhost:5000/analyze";
  const studentNames = ["Rahul", "Ananya", "Arjun"];
  
  function updateCounter() {
    const counter = document.getElementById('dataCounter');
    if (counter) {
      counter.innerHTML = `📊 ${sessionScores.length} explanations`;
      if (sessionScores.length > 0) {
        counter.style.background = '#4CAF50';
        counter.style.color = 'white';
      } else {
        counter.style.background = '#eef2f5';
        counter.style.color = '#1a2a36';
      }
    }
  }
  
  function showBubble(studentName, message, emoji = "") {
    const bubbleDiv = document.getElementById(`bubble${studentName}`);
    if (!bubbleDiv) return;
    bubbleDiv.innerHTML = `<div class="bubble">${emoji} ${message}</div>`;
    setTimeout(() => {
      if(bubbleDiv.firstChild) bubbleDiv.firstChild.remove();
    }, 3500);
  }
  
  function extractKeywordsFromText(text) {
    const words = text.toLowerCase().split(/\s+/);
    const stopWords = new Set(['the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'is', 'are', 'was', 'were', 'be', 'been', 'being']);
    const keywordMap = new Map();
    words.forEach(word => {
      const cleanWord = word.replace(/[^\w\s]/g, '');
      if (cleanWord.length > 3 && !stopWords.has(cleanWord)) {
        keywordMap.set(cleanWord, (keywordMap.get(cleanWord) || 0) + 1);
      }
    });
    return Array.from(keywordMap.entries()).sort((a, b) => b[1] - a[1]).slice(0, 35).map(entry => entry[0]);
  }
  
  async function extractTextFromPDF(arrayBuffer) {
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      fullText += textContent.items.map(item => item.str).join(' ') + '\n';
    }
    return fullText;
  }
  
  document.getElementById('pdfUpload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const fileList = document.getElementById('fileList');
    fileList.innerHTML = `<li><i class="fas fa-spinner fa-spin"></i> Processing ${file.name}...</li>`;
    
    try {
      let text = '';
      if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
        text = await file.text();
        fileList.innerHTML = `<li><i class="fas fa-file-alt"></i> ${file.name}</li><li><i class="fas fa-check-circle"></i> Loaded successfully</li>`;
      } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
        const arrayBuffer = await file.arrayBuffer();
        text = await extractTextFromPDF(arrayBuffer);
        const wordCount = text.split(/\s+/).length;
        fileList.innerHTML = `<li><i class="fas fa-file-pdf"></i> ${file.name}</li><li><i class="fas fa-check-circle"></i> ${wordCount} words extracted</li>`;
      }
      
      uploadedKeywords = extractKeywordsFromText(text);
      document.getElementById('boardFileName').innerHTML = `📄 ${file.name}`;
      document.getElementById('boardContent').innerHTML = `✅ Material loaded! ${uploadedKeywords.length} keywords extracted.`;
      document.getElementById('alignmentMeter').style.display = 'block';
      showBubble('Ananya', `Loaded ${uploadedKeywords.length} key topics!`, '📚');
    } catch (error) {
      fileList.innerHTML = `<li><i class="fas fa-exclamation-triangle"></i> Error: ${error.message}</li>`;
    }
  });
  
  function checkAlignment(spokenText) {
    if (!uploadedKeywords.length) return 100;
    const spokenWords = spokenText.toLowerCase().split(/\s+/);
    let matched = uploadedKeywords.filter(kw => spokenWords.some(w => w.includes(kw))).length;
    const alignment = (matched / uploadedKeywords.length) * 100;
    
    const fillBar = document.getElementById('alignmentFill');
    if (fillBar) {
      fillBar.style.width = `${alignment}%`;
      if (alignment >= 70) fillBar.style.background = 'linear-gradient(90deg, #4CAF50, #8BC34A)';
      else if (alignment >= 40) fillBar.style.background = 'linear-gradient(90deg, #FFC107, #FF9800)';
      else fillBar.style.background = 'linear-gradient(90deg, #F44336, #E91E63)';
      document.getElementById('alignmentText').innerHTML = `${Math.round(alignment)}% aligned`;
    }
    
    if (alignment < 30 && sessionActive && uploadedKeywords.length > 0) {
      document.querySelectorAll('.student-card').forEach(card => {
        card.classList.add('shake');
        setTimeout(() => card.classList.remove('shake'), 500);
      });
    }
    
    return alignment;
  }
  
  function updateClassroomUI(reactions) {
    if (reactions) {
      reactions.forEach(r => {
        const statusSpan = document.getElementById(`status${r.name}`);
        if (statusSpan) statusSpan.innerText = `${r.emoji} ${r.status}`;
        if (r.message) showBubble(r.name, r.message, r.emoji);
      });
    }
  }
  
  async function sendExplanationToAI(spokenText) {
    if (!sessionActive) {
      console.log("Lecture not active");
      return;
    }
    if (!spokenText || spokenText.trim().length === 0) return;
    
    // Check for simple greetings (short messages)
    const lowerText = spokenText.toLowerCase().trim();
    if (lowerText === "good morning" || lowerText === "hello" || lowerText === "hi" || lowerText === "hey" || lowerText === "namaste") {
      showBubble("Rahul", `Good morning, Teacher! ☀️`, "🌅");
      showBubble("Ananya", `Hello! Ready to learn! 📚`, "👋");
      showBubble("Arjun", `Hi there! Let's begin! 🎓`, "👍");
      document.getElementById('boardContent').innerHTML = `<i class="fas fa-comment-dots"></i> Teacher: "${escapeHtml(spokenText)}"<br><br><span style="color: #4CAF50;">✨ Students greeted you back! ✨</span>`;
      return;
    }
    
    const alignment = checkAlignment(spokenText);
    document.getElementById('boardContent').innerHTML = `<i class="fas fa-comment-dots"></i> "${escapeHtml(spokenText)}"<br><br><small>📊 Alignment: ${Math.round(alignment)}%</small>`;
    
    const now = Date.now();
    if (now - lastApiCall < 1500) {
      sessionScores.push({ clarity: 6, completeness: 6, engagement: 6, alignment: alignment });
      updateCounter();
      return;
    }
    lastApiCall = now;
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: spokenText })
      });
      
      if (response.ok) {
        const data = await response.json();
        if (data.scores) {
          data.scores.alignment = alignment;
          sessionScores.push(data.scores);
          updateCounter();
        }
        if (data.reactions) updateClassroomUI(data.reactions);
      } else {
        throw new Error('Backend error');
      }
    } catch (err) {
      console.log("Backend offline - using local scoring");
      sessionScores.push({ clarity: 6, completeness: 6, engagement: 6, alignment: alignment });
      updateCounter();
      updateClassroomUI([
        { name: "Rahul", emoji: "🤔", status: "Thinking", message: "Interesting point!" },
        { name: "Ananya", emoji: "❓", status: "Curious", message: "Can you elaborate?" },
        { name: "Arjun", emoji: "👍", status: "Following", message: "Makes sense!" }
      ]);
    }
  }
  
  function initSpeech() {
    if (!('webkitSpeechRecognition' in window)) {
      alert("Speech recognition requires Chrome browser");
      return false;
    }
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onstart = () => {
      isMicActive = true;
      const micBtn = document.getElementById('micButton');
      micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i> Stop Mic';
      micBtn.classList.add('mic-active');
    };
    recognition.onend = () => {
      isMicActive = false;
      const micBtn = document.getElementById('micButton');
      micBtn.innerHTML = '<i class="fas fa-microphone"></i> Start Mic';
      micBtn.classList.remove('mic-active');
    };
    recognition.onresult = (event) => {
      let final = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) final += event.results[i][0].transcript;
      }
      if (final.trim()) sendExplanationToAI(final);
    };
    return true;
  }
  
  function startMic() {
    if (!sessionActive) { alert("Start lecture first!"); return; }
    if (isMicActive) { recognition?.stop(); }
    else { if (!recognition && !initSpeech()) return; recognition.start(); }
  }
  
  // FIXED: Show Summary Page
  function showSummaryPage(finalScore, avgClarity, avgCompleteness, avgEngagement, avgAlignment, suggestions, appreciation) {
    // Remove any existing summary page
    const existingSummary = document.querySelector('.summary-page');
    if (existingSummary) existingSummary.remove();
    
    const summaryDiv = document.createElement('div');
    summaryDiv.className = 'summary-page';
    const circleDeg = (finalScore / 100) * 360;
    
    summaryDiv.innerHTML = `
      <div class="summary-card">
        <i class="fas fa-chart-line" style="font-size: 48px; color:#2C7DA0;"></i>
        <h1>📊 Teaching Summary</h1>
        <p style="color: #666; margin-bottom: 20px;">Session completed on ${new Date().toLocaleString()}</p>
        <div class="score-circle" style="background: conic-gradient(#2C7DA0 ${circleDeg}deg, #e9ecef 0deg);">
          <span style="background:white; width:120px; height:120px; display:flex; align-items:center; justify-content:center; border-radius:50%; font-size:2.5rem; font-weight:bold;">${finalScore}</span>
        </div>
        <p><strong>Final Score: ${finalScore}/100</strong></p>
        <div style="margin: 20px 0;">
          <p>🧩 <strong>Clarity:</strong> ${avgClarity.toFixed(1)}/10</p>
          <p>📖 <strong>Completeness:</strong> ${avgCompleteness.toFixed(1)}/10</p>
          <p>⚡ <strong>Engagement:</strong> ${avgEngagement.toFixed(1)}/10</p>
          <p>📚 <strong>Material Alignment:</strong> ${avgAlignment.toFixed(1)}%</p>
          <p><strong>Total Explanations:</strong> ${sessionScores.length}</p>
        </div>
        <div style="background:#f0f4fa; padding: 16px; border-radius: 32px; margin: 20px 0;">
          <i class="fas fa-heart" style="color:#e74c3c;"></i>
          <p style="margin-top: 10px;">${appreciation}</p>
        </div>
        <h3>💡 Suggestions for Improvement</h3>
        <ul style="text-align: left; margin: 15px 30px;">
          ${suggestions.map(s => `<li style="margin: 8px 0;">${s}</li>`).join('')}
        </ul>
        <button class="restart-btn" onclick="location.reload()">
          <i class="fas fa-sync-alt"></i> Start New Session
        </button>
      </div>
    `;
    document.body.appendChild(summaryDiv);
  }
  
  function endLecture() {
    if (!sessionActive) {
      console.log("No active lecture");
      return;
    }
    
    console.log("Ending lecture... Scores collected:", sessionScores.length);
    
    sessionActive = false;
    if (recognition && isMicActive) recognition.stop();
    
    const toggleBtn = document.getElementById('lectureToggleBtn');
    toggleBtn.innerHTML = '<i class="fas fa-play"></i> Start Lecture';
    toggleBtn.classList.remove('lecture-active');
    
    if (sessionScores.length === 0) {
      alert("No teaching data collected. Please speak or type something during the lecture before ending.");
      return;
    }
    
    // Calculate averages
    let totalClarity = 0, totalCompleteness = 0, totalEngagement = 0, totalAlignment = 0;
    sessionScores.forEach(s => {
      totalClarity += s.clarity || 5;
      totalCompleteness += s.completeness || 5;
      totalEngagement += s.engagement || 5;
      totalAlignment += s.alignment || 0;
    });
    
    const n = sessionScores.length;
    const avgClarity = totalClarity / n;
    const avgCompleteness = totalCompleteness / n;
    const avgEngagement = totalEngagement / n;
    const avgAlignment = totalAlignment / n;
    const finalScore = Math.min(100, Math.round(((avgClarity + avgCompleteness + avgEngagement) / 3) * 10));
    
    // Generate suggestions
    let suggestions = [];
    if (avgClarity < 5) suggestions.push("🧠 Simplify concepts using step-by-step explanations");
    if (avgCompleteness < 5) suggestions.push("📘 Include real-life examples and case studies");
    if (avgEngagement < 5) suggestions.push("🎤 Ask more interactive questions to keep students engaged");
    if (avgAlignment < 50 && uploadedKeywords.length) suggestions.push("📚 Stay closer to the uploaded teaching material");
    if (suggestions.length === 0) suggestions.push("🏆 Excellent teaching! Your students were highly engaged!");
    
    let appreciation = "";
    if (finalScore >= 85) {
      appreciation = "🌟 Outstanding performance! You're a natural teacher! Your students loved the session!";
    } else if (finalScore >= 70) {
      appreciation = "👍 Great job! Your teaching is effective. With a few tweaks, you'll be excellent!";
    } else if (finalScore >= 50) {
      appreciation = "📈 Good effort! Keep practicing and focus on clarity and engagement.";
    } else {
      appreciation = "💪 Every expert was once a beginner. Keep practicing and use the suggestions above!";
    }
    
    // Show the feedback page
    showSummaryPage(finalScore, avgClarity, avgCompleteness, avgEngagement, avgAlignment, suggestions, appreciation);
  }
  
  function startLecture() {
    if (sessionActive) return;
    
    sessionActive = true;
    sessionScores = [];
    updateCounter();
    
    const toggleBtn = document.getElementById('lectureToggleBtn');
    toggleBtn.innerHTML = '<i class="fas fa-stop"></i> End Lecture';
    toggleBtn.classList.add('lecture-active');
    
    studentNames.forEach(name => {
      const span = document.getElementById(`status${name}`);
      if (span) span.innerText = `🤔 Listening`;
    });
    
    document.getElementById('boardContent').innerHTML = '🎓 Lecture started! Start explaining your topic.';
    showBubble("Rahul", "We're ready to learn!", "🧠");
    showBubble("Ananya", "I'll evaluate your teaching!", "📖");
    showBubble("Arjun", "Begin the lesson!", "🎯");
  }
  
  function toggleLecture() {
    if (sessionActive) {
      endLecture();
    } else {
      startLecture();
    }
  }
  
  function handleLogin() {
    teacherName = document.getElementById('teacherName').value.trim();
    if (!teacherName) {
      alert("Please enter your name");
      return;
    }
    
    document.getElementById('sidebarTeacherName').innerHTML = `<i class="fas fa-user-check"></i> ${teacherName}`;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContainer').style.display = 'block';
    initSpeech();
    
    setTimeout(() => {
      showBubble("Rahul", `Welcome, ${teacherName}! 👋`, "🎉");
      showBubble("Ananya", "Ready to improve your teaching!", "✨");
      showBubble("Arjun", "Let's have a great session!", "💪");
    }, 500);
  }
  
  function guestLogin() {
    document.getElementById('teacherName').value = "Guest Teacher";
    handleLogin();
  }
  
  document.getElementById('lectureToggleBtn').addEventListener('click', toggleLecture);
  document.getElementById('micButton').addEventListener('click', startMic);
  document.getElementById('manualText').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) {
        sendExplanationToAI(val);
        e.target.value = '';
      }
    }
  });
  
  document.querySelector('.upload-label')?.addEventListener('click', () => {
    document.getElementById('pdfUpload').click();
  });
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  console.log("Platform ready! Click Start Lecture, then speak or type to begin.");
</script>
</body>
</html>
